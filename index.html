<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name=""viewport" content=""width=device-width, initial-scale="1.0">
    <title>Dara (Developer)</title>
    <style>
        * { margin: 0; padding:0; box-sizing: border-box;}
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            line-height: 1.6;
        }

        .hero{
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10vw;
        }

        .hero-tag{
            font-size: 13px;
            color:#888;
            letter-spacing:.1em;
            text-transform:uppercase;
            margin-bottom:16px;
        }
        .hero-name{
            font-size: clamp(40px, 8vm, 80px);
            font-weight:700;
            line-height:1.1;
            margin-bottom:20px;
        }
        .hero-name span{color:#888;}
        .hero-bio{
            font-size:18px;
            color:#aaa;
            max-width:480px;
            margin-bottom:32px;
        }
        .hero-links{display:flex;gap:16px;}
        .hero-links a{
                font-size:14px;
                color;#f0f0f0;
                text-decoration:none;
                border:1px solid #333;
                padding:10px 20px;
                border-radius:border-color .2s,color .2s;
        }
        hero-links a:hover{border-color:f0f0f0;};

        .currently{
            padding:80px 10vw;
            border-top:1px solid #1a1a1a;
        }

        .section-label{
            font-size:12px;
            color:#555;
            letter-spacing: .1em;
            text-transform:uppercase;
            margin-bottom:24px;

        }
        .current-item{
            display:flex;
            gap:16px;
            align-items:flex-start;
            margin-bottom:16px;

        }
        .current-dot{
            display:flex;
            gap:16px;
            align-items:flex-start;
            margin-bottom:16px;
        }

        .current-dot{
            width:8px;height:8px;
            background: #f0f0f0;
            border-radius:50%;
            margin-top:7px;
            flex-shrink:0;
        }

        .current-dot{
            width: 8px; height: 8px;
            background: #f0f0f0;
            border-radius:50%;
            margin-top:7px;
            flex-shrink:0;

        }

        .current-text{font-size:16px;color:#ccc;}
        .current-sub{font-size:13px;color:#555;margin-top:3px;}
        .projects{
            padding:80px 10vw;
            border-top: 1px solid #1a1a1a;

        }
        .project-card{
            border:1px solid #1a1a1a;
            border-radius:8px;
            padding:24px;
            margin-bottom:12px;
            transition:border-color .2s;
            cursor:default;
        }
        .project-card:hover{border-color:#333;}
        .project-name{
            font-size:16px;
            font-weight:500;
            margin-bottom:6px;

        }
        .project-desc{font-size: 14px;color:#333;}
        footer{
            padding:40px 10vw;
            border-top:1px solid #1a1a1a;
            font-size:13px;
            color:#444;


        }

        </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-name">Dara <span>(Developer)</span></h1>
        <p class="hero-bio">hi</p>
    
    
    </section>

    <footer>
        Wuzy
    </footer>
</body>
</html>>
