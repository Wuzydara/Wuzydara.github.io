    <title>Dara (Developer)</title>
    <style>
        * { margin: 0; padding:0; box-sizing: border-box;}
        body {

        }
        .hero-links{display:flex;gap:16px;}
        .hero-links a{
                font-size:14px;
                color;#f0f0f0;
                text-decoration:none;
                border:1px solid #333;
                padding:10px 20px;
                border-radius:border-color .2s,color .2s;
        }
        hero-links a:hover{border-color:f0f0f0;};

        .currently{
            padding:80px 10vw;
            border-top:1px solid #1a1a1a;
        }
